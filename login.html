<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — AURORA</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .auth-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:40px;width:100%;max-width:440px;box-shadow:0 24px 64px rgba(0,0,0,0.4)}
    .auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:32px}
    .auth-logo-icon{width:36px;height:36px;background:var(--blue-dim);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
    .auth-logo-text{font-family:var(--font-head);font-size:20px;font-weight:800;letter-spacing:-0.5px}
    .auth-title{font-family:var(--font-head);font-size:24px;font-weight:800;margin-bottom:6px}
    .auth-sub{font-size:13px;color:var(--muted);margin-bottom:28px}
    .role-tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:24px}
    .role-tab{padding:10px;border-radius:var(--r-sm);border:1px solid var(--border2);background:var(--surface2);cursor:pointer;text-align:center;transition:all var(--t-fast)}
    .role-tab:hover{border-color:var(--blue)}
    .role-tab.active{background:var(--blue-dim);border-color:var(--blue)}
    .role-tab-icon{font-size:18px;margin-bottom:4px}
    .role-tab-label{font-size:12px;font-weight:600;color:var(--text2)}
    .role-tab.active .role-tab-label{color:var(--blue)}
    .error-msg{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:var(--r-sm);padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:16px;display:none}
    .field-error{font-size:11px;color:var(--red);margin-top:4px;display:none}
    .form-control.invalid{border-color:var(--red)!important}
    .success-msg{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);border-radius:var(--r-sm);padding:10px 14px;font-size:13px;color:var(--green);margin-bottom:16px;display:none}
  </style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">◈</div>
      <div class="auth-logo-text">AURORA</div>
    </div>
    <div class="auth-title">Welcome back</div>
    <div class="auth-sub">Sign in to your AURORA dashboard</div>

    <!-- ROLE TABS -->
    <div class="role-tabs">
      <div class="role-tab active" onclick="setRole('vendor',this)">
        <div class="role-tab-icon">🏪</div>
        <div class="role-tab-label">Vendor</div>
      </div>
      <div class="role-tab" onclick="setRole('owner',this)">
        <div class="role-tab-icon">👑</div>
        <div class="role-tab-label">Business Owner</div>
      </div>
    </div>

    <!-- ERROR / SUCCESS -->
    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg">Signing in...</div>

    <!-- FORM -->
    <form id="loginForm" novalidate>
      <input type="hidden" name="role" id="roleInput" value="vendor"/>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" id="email" name="email" placeholder="you@example.com" autocomplete="email"/>
        <div class="field-error" id="emailError">Please enter a valid email address.</div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" autocomplete="current-password"/>
        <div class="field-error" id="passwordError">Password must be at least 6 characters.</div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px" id="submitBtn">Sign In →</button>
    </form>

    <div style="text-align:center;margin-top:20px;font-size:13px;color:var(--muted)">
      Don't have an account? <a href="register.html" style="color:var(--blue)">Register here</a>
    </div>
  </div>
</div>

<script>
let selectedRole = 'vendor';

function setRole(role, el) {
  selectedRole = role;
  document.getElementById('roleInput').value = role;
  document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

// Show errors from PHP redirect
const params = new URLSearchParams(window.location.search);
if (params.get('error') === 'invalid') {
  showError('Invalid email or password. Please try again.');
} else if (params.get('error') === 'empty') {
  showError('Please fill in all fields.');
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

function clearErrors() {
  document.getElementById('errorMsg').style.display = 'none';
  ['email','password'].forEach(id => {
    document.getElementById(id).classList.remove('invalid');
    document.getElementById(id+'Error').style.display = 'none';
  });
}

document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  clearErrors();

  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  let valid = true;

  // Email validation
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!email || !emailRegex.test(email)) {
    document.getElementById('email').classList.add('invalid');
    document.getElementById('emailError').style.display = 'block';
    valid = false;
  }

  // Password validation
  if (!password || password.length < 6) {
    document.getElementById('password').classList.add('invalid');
    document.getElementById('passwordError').style.display = 'block';
    valid = false;
  }

  if (!valid) return;

  // Show loading state
  const btn = document.getElementById('submitBtn');
  btn.textContent = 'Signing in...';
  btn.disabled = true;
  document.getElementById('successMsg').style.display = 'block';

  // Submit to PHP
  this.action = 'php/login.php';
  this.method = 'POST';
  this.removeEventListener('submit', arguments.callee);
  this.submit();
});
</script>
</body>
</html>
