<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — AURORA</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .auth-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:40px;width:100%;max-width:480px;box-shadow:0 24px 64px rgba(0,0,0,0.4)}
    .auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:32px}
    .auth-logo-icon{width:36px;height:36px;background:var(--blue-dim);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
    .auth-logo-text{font-family:var(--font-head);font-size:20px;font-weight:800}
    .auth-title{font-family:var(--font-head);font-size:24px;font-weight:800;margin-bottom:6px}
    .auth-sub{font-size:13px;color:var(--muted);margin-bottom:28px}
    .role-tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:24px}
    .role-tab{padding:10px;border-radius:var(--r-sm);border:1px solid var(--border2);background:var(--surface2);cursor:pointer;text-align:center;transition:all var(--t-fast)}
    .role-tab.active{background:var(--blue-dim);border-color:var(--blue)}
    .role-tab-icon{font-size:18px;margin-bottom:4px}
    .role-tab-label{font-size:12px;font-weight:600;color:var(--text2)}
    .role-tab.active .role-tab-label{color:var(--blue)}
    .error-msg{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:var(--r-sm);padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:16px;display:none}
    .field-error{font-size:11px;color:var(--red);margin-top:4px;display:none}
    .form-control.invalid{border-color:var(--red)!important}
    .strength-bar{height:4px;border-radius:2px;background:var(--border2);margin-top:6px;overflow:hidden}
    .strength-fill{height:100%;border-radius:2px;transition:width 0.3s,background 0.3s}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  </style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">◈</div>
      <div class="auth-logo-text">AURORA</div>
    </div>
    <div class="auth-title">Create account</div>
    <div class="auth-sub">Join AURORA to manage your business intelligence</div>

    <div class="role-tabs">
      <div class="role-tab active" onclick="setRole('vendor',this)">
        <div class="role-tab-icon">🏪</div>
        <div class="role-tab-label">Vendor</div>
      </div>
      <div class="role-tab" onclick="setRole('owner',this)">
        <div class="role-tab-icon">👑</div>
        <div class="role-tab-label">Business Owner</div>
      </div>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <form id="registerForm" novalidate>
      <input type="hidden" name="role" id="roleInput" value="vendor"/>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-control" id="name" name="name" placeholder="Your full name"/>
          <div class="field-error" id="nameError">Name is required.</div>
        </div>
        <div class="form-group">
          <label class="form-label">Business Name</label>
          <input type="text" class="form-control" id="business_name" name="business_name" placeholder="Store name"/>
          <div class="field-error" id="businessError">Business name is required.</div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" id="email" name="email" placeholder="you@example.com"/>
        <div class="field-error" id="emailError">Please enter a valid email.</div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="password" name="password" placeholder="Min. 6 characters" oninput="checkStrength(this.value)"/>
        <div class="strength-bar"><div class="strength-fill" id="strengthFill" style="width:0%"></div></div>
        <div class="field-error" id="passwordError">Password must be at least 6 characters.</div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" class="form-control" id="confirm" placeholder="Re-enter password"/>
        <div class="field-error" id="confirmError">Passwords do not match.</div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px" id="submitBtn">Create Account →</button>
    </form>

    <div style="text-align:center;margin-top:20px;font-size:13px;color:var(--muted)">
      Already have an account? <a href="login.html" style="color:var(--blue)">Sign in here</a>
    </div>
  </div>
</div>
<script>
let selectedRole='vendor';
function setRole(role,el){
  selectedRole=role;
  document.getElementById('roleInput').value=role;
  document.querySelectorAll('.role-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
}

function checkStrength(val){
  const fill=document.getElementById('strengthFill');
  if(val.length===0){fill.style.width='0%';return;}
  let score=0;
  if(val.length>=6)score++;
  if(val.length>=10)score++;
  if(/[A-Z]/.test(val))score++;
  if(/[0-9]/.test(val))score++;
  if(/[^A-Za-z0-9]/.test(val))score++;
  const pct=[0,20,40,60,80,100][score];
  const color=score<=1?'var(--red)':score<=2?'var(--amber)':score<=3?'var(--blue)':'var(--green)';
  fill.style.width=pct+'%'; fill.style.background=color;
}

const params=new URLSearchParams(window.location.search);
if(params.get('error')==='email_exists'){
  const el=document.getElementById('errorMsg');
  el.textContent='An account with this email already exists.';
  el.style.display='block';
}

document.getElementById('registerForm').addEventListener('submit',function(e){
  e.preventDefault();
  let valid=true;
  ['name','business_name','email','password'].forEach(id=>{
    document.getElementById(id).classList.remove('invalid');
    document.getElementById(id.replace('business_name','business')+'Error')&&(document.getElementById(id.replace('business_name','business')+'Error').style.display='none');
  });
  document.getElementById('errorMsg').style.display='none';

  const name=document.getElementById('name').value.trim();
  const biz=document.getElementById('business_name').value.trim();
  const email=document.getElementById('email').value.trim();
  const pass=document.getElementById('password').value;
  const conf=document.getElementById('confirm').value;
  const emailRegex=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  if(!name){document.getElementById('name').classList.add('invalid');document.getElementById('nameError').style.display='block';valid=false;}
  if(!biz){document.getElementById('business_name').classList.add('invalid');document.getElementById('businessError').style.display='block';valid=false;}
  if(!email||!emailRegex.test(email)){document.getElementById('email').classList.add('invalid');document.getElementById('emailError').style.display='block';valid=false;}
  if(!pass||pass.length<6){document.getElementById('password').classList.add('invalid');document.getElementById('passwordError').style.display='block';valid=false;}
  if(pass!==conf){document.getElementById('confirm').classList.add('invalid');document.getElementById('confirmError').style.display='block';valid=false;}

  if(!valid)return;

  const btn=document.getElementById('submitBtn');
  btn.textContent='Creating account...';btn.disabled=true;
  this.action='php/register.php';this.method='POST';
  this.removeEventListener('submit',arguments.callee);
  this.submit();
});
</script>
</body>
</html>
